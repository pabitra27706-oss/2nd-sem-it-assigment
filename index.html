<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML Assignment Editor</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <!-- SIDEBAR -->
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <div class="logo">
                <i class="fas fa-code"></i>
                <span>AssignmentEditor</span>
            </div>
            <button class="sidebar-close" onclick="toggleSidebar()">
                <i class="fas fa-times"></i>
            </button>
        </div>

        <div class="sidebar-file">
            <label><i class="fas fa-file-code"></i> File Name</label>
            <input type="text" id="fileName" placeholder="My Assignment" value="HTML_Assignment">
        </div>

        <div class="sidebar-nav">
            <p class="nav-label">Questions</p>
            <div id="sidebarQuestionList"></div>
        </div>

        <div class="sidebar-footer">
            <button onclick="generatePDF()" class="btn-generate">
                <i class="fas fa-file-pdf"></i> Generate Output
            </button>
            <button onclick="resetAll()" class="btn-reset">
                <i class="fas fa-trash"></i> Reset All
            </button>
        </div>

        <!-- Theme Toggle in Sidebar -->
        <div class="theme-toggle" onclick="toggleTheme()">
            <i class="fas fa-moon theme-icon" id="themeIcon"></i>
            <span class="theme-toggle-label" id="themeLabel">Dark Mode</span>
            <label class="toggle-switch">
                <input type="checkbox" id="themeCheckbox" onchange="toggleTheme()">
                <span class="toggle-track"></span>
            </label>
        </div>

    </aside>

    <!-- OVERLAY -->
    <div class="overlay" id="overlay" onclick="toggleSidebar()"></div>

    <!-- MAIN -->
    <main class="main" id="main">

        <!-- TOP NAV -->
        <nav class="topnav">
            <button class="menu-btn" onclick="toggleSidebar()">
                <i class="fas fa-bars"></i>
            </button>
            <div class="topnav-title" id="topnavTitle">
                <i class="fas fa-home"></i> All Questions
            </div>
            <div class="topnav-actions" id="topnavActions">
                <!-- Theme Toggle Button in TopNav -->
                <button class="topnav-theme" onclick="toggleTheme()" id="topnavThemeBtn" title="Toggle Theme">
                    <i class="fas fa-moon"></i>
                </button>
                <button onclick="generatePDF()" class="btn-icon-primary">
                    <i class="fas fa-file-pdf"></i>
                    <span>Generate PDF</span>
                </button>
            </div>
        </nav>

        <!-- LIST VIEW -->
        <div id="listView" class="view active">
            <div class="hero">
                <div class="hero-text">
                    <h2>Welcome 👋</h2>
                    <p>Select any question to start writing your code</p>
                </div>
                <div class="hero-stats">
                    <div class="stat">
                        <span id="completedCount">0</span>
                        <label>Completed</label>
                    </div>
                    <div class="stat">
                        <span>26</span>
                        <label>Total</label>
                    </div>
                    <div class="stat">
                        <span id="pendingCount">26</span>
                        <label>Remaining</label>
                    </div>
                </div>
            </div>

            <!-- Progress Bar -->
            <div class="progress-wrap">
                <div class="progress-top">
                    <span>Overall Progress</span>
                    <span id="progressPercent">0%</span>
                </div>
                <div class="progress-bar">
                    <div class="progress-fill" id="progressFill"></div>
                </div>
            </div>

            <!-- Filter Tabs -->
            <div class="filter-tabs">
                <button class="tab active" onclick="filterQuestions('all', this)">All (26)</button>
                <button class="tab" onclick="filterQuestions('html', this)">HTML (1-15)</button>
                <button class="tab" onclick="filterQuestions('css', this)">CSS (16-26)</button>
                <button class="tab" onclick="filterQuestions('done', this)">Completed</button>
            </div>

            <!-- Question Grid -->
            <div id="questionGrid" class="question-grid"></div>
        </div>

        <!-- EDITOR VIEW -->
        <div id="editorView" class="view">
            <div class="editor-layout">

                <!-- Left Panel -->
                <div class="editor-panel">
                    <div class="panel-header">
                        <div class="panel-title">
                            <i class="fas fa-pencil-alt"></i>
                            <span id="editorQNum">Question 1</span>
                        </div>
                        <div class="panel-actions">
                            <button onclick="loadSample()" class="btn-sm btn-orange">
                                <i class="fas fa-magic"></i> Sample
                            </button>
                            <button onclick="clearCode()" class="btn-sm btn-gray">
                                <i class="fas fa-eraser"></i> Clear
                            </button>
                        </div>
                    </div>

                    <div class="question-banner" id="questionText"></div>

                    <div class="code-wrap">
                        <div class="code-header">
                            <div class="code-dots">
                                <span class="dot red"></span>
                                <span class="dot yellow"></span>
                                <span class="dot green"></span>
                            </div>
                            <span class="code-lang">HTML / CSS</span>
                            <button onclick="copyCode()" class="btn-copy">
                                <i class="fas fa-copy"></i> Copy
                            </button>
                        </div>
                        <textarea id="codeEditor" placeholder="Write your HTML/CSS code here..."></textarea>
                    </div>

                    <div class="editor-bottom">
                        <button onclick="showListView()" class="btn-back">
                            <i class="fas fa-arrow-left"></i> Back
                        </button>
                        <div class="nav-buttons">
                            <button onclick="prevQuestion()" class="btn-nav">
                                <i class="fas fa-chevron-left"></i> Prev
                            </button>
                            <button onclick="nextQuestion()" class="btn-nav">
                                Next <i class="fas fa-chevron-right"></i>
                            </button>
                        </div>
                        <button onclick="runCode()" class="btn-run">
                            <i class="fas fa-play"></i> Run Code
                        </button>
                    </div>
                </div>

                <!-- Right Panel -->
                <div class="preview-panel">
                    <div class="panel-header">
                        <div class="panel-title">
                            <i class="fas fa-eye"></i>
                            <span>Live Preview</span>
                        </div>
                        <div class="preview-status" id="previewStatus">
                            <span class="status-dot"></span>
                            <span>Ready</span>
                        </div>
                    </div>

                    <div class="preview-wrap">
                        <div class="browser-bar">
                            <div class="browser-dots">
                                <span class="dot red"></span>
                                <span class="dot yellow"></span>
                                <span class="dot green"></span>
                            </div>
                            <div class="browser-url">
                                <i class="fas fa-lock"></i>
                                preview.local
                            </div>
                        </div>
                        <iframe id="preview" sandbox="allow-same-origin allow-scripts"></iframe>
                    </div>
                </div>

            </div>
        </div>

    </main>

    <!-- TOAST -->
    <div class="toast" id="toast"></div>

    <script src="questions.js"></script>
    <script src="script.js"></script>
    <script src="sampleAnswers.js"></script>
</body>
</html>
